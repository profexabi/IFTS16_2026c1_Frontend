<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduccion a JavaScript</title>

    <style>
        :root {
            --bg-oscuro: #0d1117;
            --bg-claro: #141a22;
        }

        body {
            background-color: var(--bg-claro);
            color: white;
            font-family: monospace;
        }

        #padre {
            border: 2px solid rgb(0, 255, 65);
            padding: 25px;
            border-radius: 5px;
            background-color: lavender;
        }

        #hijo {
            background-color: rgb(0, 255, 65);
            padding: 10px;
            border: 2px solid;
            border-radius: 5px;
        }
    </style>

<!-- Donde cargamos nuestro script?
La idea es cargar toda la pagina y despues ejecuta JavaScript 

Opcion 1: antes del cierre del </body>
Opcion 2: en <head> pero con el atributo defer (demora la ejecucion de JS hasta que se cargue el DOM)
-->
<script defer src="js/main.js"></script>
</head>
<body>
    <h1 id="titulo">Introduccion a JavaScript</h1>

    <p class="mensaje">Primer parrafo</p>
    <p class="mensaje">Segundo parrafo</p>

    <p id="miParrafo">Texto original</p>

    <button id="boton">Soy un boton!</button>

    <hr>

    <form id="miFormulario">
        <label for="inputTest">Texto</label>
        <input type="text" name="test" id="inputTest">

        <input type="submit" value="Enviar">
    </form>

    <hr>

    <h4>Comprendiendo la propagacion de eventos</h4>
    <div id="padre">
        <button id="hijo">Boton</button>
    </div>

    <hr>

    <div id="contenedorInfo"></div>
</body>
</html>
